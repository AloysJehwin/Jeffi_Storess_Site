services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeffi-app
    env_file: .env.production
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./certs:/app/certs:ro
      - ./jeffi-stores-76e9ecaecdd6.json:/app/jeffi-stores-76e9ecaecdd6.json:ro
    depends_on:
      - redis
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: jeffi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
    restart: always
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: jeffi-redis
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - internal

volumes:
  redis-data:

networks:
  internal:
    driver: bridge
