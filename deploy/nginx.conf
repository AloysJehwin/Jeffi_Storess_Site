# HTTP (port 80) — CloudFront origin + ACME challenge + redirect
server {
    listen 80;
    server_name jeffistores.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # CloudFront connects here via HTTP. Serve the app directly.
    # Direct browser visitors still get redirected to HTTPS.
    location / {
        # CloudFront sends X-Forwarded-Proto: https and Via header
        if ($http_x_amz_cf_id) {
            set $cloudfront 1;
        }

        # If not from CloudFront, redirect to HTTPS
        if ($cloudfront != 1) {
            return 301 https://$host$request_uri;
        }

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets (when served via CloudFront)
    location /_next/static {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}

# Public HTTPS (port 443) — storefront + admin login
server {
    listen 443 ssl http2;
    server_name jeffistores.in;

    ssl_certificate /etc/letsencrypt/live/jeffistores.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jeffistores.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location /_next/static {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}

# Admin HTTPS (port 443) — mTLS required
server {
    listen 443 ssl;
    server_name admin.jeffistores.in;

    ssl_certificate /etc/letsencrypt/live/jeffistores.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jeffistores.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    ssl_client_certificate /app/certs/ca-cert.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    client_max_body_size 20M;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-Verified $ssl_client_verify;
        proxy_set_header X-Client-DN $ssl_client_s_dn;
    }
}
