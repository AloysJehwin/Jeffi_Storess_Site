name: Seed SS 202 Products (RDS)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get EC2 public IP
        id: ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "host=$IP" >> $GITHUB_OUTPUT

      - name: Copy seed script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.ec2.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: scripts/seed-ss202.mjs
          target: /tmp/

      - name: Run seed script in app container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/jeffi-stores
            docker cp /tmp/scripts/seed-ss202.mjs $(docker compose -f docker-compose.prod.yml ps -q app):/tmp/seed-ss202.mjs
            docker compose -f docker-compose.prod.yml exec -T app node /tmp/seed-ss202.mjs
