name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Stage 1 — Code Quality
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Stage 2 — Build (gate: lint + typecheck pass)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: postgresql://localhost:5432/dummy
          JWT_SECRET: ci-test-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SKIP_DB_CHECK: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: |
            .next/
            !.next/cache
          retention-days: 1

  # ─────────────────────────────────────────────
  # Stage 3 — Docker build check (gate: build pass)
  # ─────────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: jeffi-stores:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Stage 4 — PR gate summary
  # ─────────────────────────────────────────────
  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, docker-check]
    if: always()
    steps:
      - name: Check all stages passed
        run: |
          echo "Lint:         ${{ needs.lint.result }}"
          echo "Type Check:   ${{ needs.typecheck.result }}"
          echo "Build:        ${{ needs.build.result }}"
          echo "Docker Check: ${{ needs.docker-check.result }}"

          if [[ "${{ needs.lint.result }}"         != "success" ||
                "${{ needs.typecheck.result }}"    != "success" ||
                "${{ needs.build.result }}"        != "success" ||
                "${{ needs.docker-check.result }}" != "success" ]]; then
            echo "One or more stages failed. PR cannot be merged."
            exit 1
          fi

          echo "All stages passed. PR is ready to merge."
