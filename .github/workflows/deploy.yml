name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get EC2 public IP
        id: ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "host=$IP" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/jeffi-stores
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker rm -f jeffi-redis jeffi-app jeffi-nginx 2>/dev/null || true
            docker system prune -af --volumes 2>&1 | grep -v "prune operation is already running" || true
            docker compose -f docker-compose.prod.yml build --no-cache app
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Run DB migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2.outputs.host }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /opt/jeffi-stores
            docker compose -f docker-compose.prod.yml exec -T app node -e "
              const { Pool } = require('pg');
              const fs = require('fs');
              const pool = new Pool({ connectionString: process.env.DATABASE_URL });
              (async () => {
                const sql = fs.readFileSync('/app/database/migration.sql', 'utf8').trim();
                if (sql && !sql.startsWith('--')) {
                  process.stdout.write('Running migration.sql...');
                  await pool.query(sql);
                  process.stdout.write(' done\n');
                } else {
                  process.stdout.write('No pending migration.\n');
                }
                await pool.end();
              })().catch(e => { process.stderr.write(e.message + '\n'); process.exit(1); });
            "

      - name: Invalidate CloudFront cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
